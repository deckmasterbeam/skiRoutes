<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
      .avatar { border-radius: 50%; width: 100px; }
      a.button { display: inline-block; margin-top: 12px; padding: 10px 16px; text-decoration: none; color: white; background: #4285f4; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Your Profile</h1>
      <img src="{{ user.picture }}" alt="Profile" class="avatar" />
      <p><strong>Name:</strong> {{ user.name }}</p>
      <p><strong>Email:</strong> {{ user.email }}</p>
      <p><a href="{{ url_for('logout') }}" class="button">Log out</a></p>
      <p><a href="{{ url_for('index') }}">Back to home</a></p>
    </div>
  </body>
</html>
