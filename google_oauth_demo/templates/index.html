<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google OAuth Demo</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
      .avatar { border-radius: 50%; width: 80px; }
      a.button { display: inline-block; margin-top: 12px; padding: 10px 16px; text-decoration: none; color: white; background: #4285f4; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Google OAuth Demo</h1>
      {% if user %}
        <p>You are signed in as <strong>{{ user.name }}</strong>.</p>
        <img src="{{ user.picture }}" alt="Profile picture" class="avatar" />
        <p>{{ user.email }}</p>
        <p><a href="{{ url_for('profile') }}" class="button">View profile</a></p>
        <p><a href="{{ url_for('logout') }}">Logout</a></p>
      {% else %}
        <p>This example uses Google Sign-In with a backend callback.</p>
        <p><a href="{{ url_for('login') }}" class="button">Sign in with Google</a></p>
      {% endif %}
    </div>
  </body>
</html>
